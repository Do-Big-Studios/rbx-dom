name: Luau Linting
on:
  push:
    branches: "master"
  pull_request:
    branches: "master"
    paths: ["*.lua", "*.luau"]
jobs: 
  Lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: CompeyDev/setup-rokit@v0.1.2
        with:
          version: 'v1.1.0'
          token: ${{ secrets.SUBMODULE_PAT }}
      
      - name: Run Selene
        run: selene rbx_dom_lua/src
      
      - name: Run StyLua
        run: stylua rbx_dom_lua/src --check