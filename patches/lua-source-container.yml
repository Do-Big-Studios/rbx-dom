Change:
  Script:
    Source:
      Scriptability: Custom

  ModuleScript:
    Source:
      Scriptability: Custom

# As of Roblox 726 LuaSourceContainer.ScriptGuid is no longer present in the
# API dump, so it must be added rather than changed.
#
# ScriptGuid is randomly generated every time a script is saved from Studio
# which means that its default would change every time a database was
# generated. To get around this, we override the default. Roblox generates a
# new ScriptGuid if the one in a file is an empty string, so an empty string is
# a reasonable default.
Add:
  LuaSourceContainer:
    ScriptGuid:
      DataType: !Value String
      Scriptability: None
      Serialization:
        Type: Serializes
      DefaultValue: !String ""
