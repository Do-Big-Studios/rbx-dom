Change:
  Fire:
    Size:
      Serialization:
        Type: SerializesAs
        As: size_xml
    Heat:
      Serialization:
        Type: SerializesAs
        As: heat_xml

  Smoke:
    Opacity:
      Serialization:
        Type: SerializesAs
        As: opacity_xml
    Size:
      Serialization:
        Type: SerializesAs
        As: size_xml
    RiseVelocity:
      Serialization:
        Type: SerializesAs
        As: riseVelocity_xml

# As of Roblox 726 these serialization-only aliases are no longer present in
# the API dump, so they must be added rather than changed.
Add:
  Fire:
    size_xml:
      DataType: !Value Float32
      Scriptability: None
      AliasFor: Size
    heat_xml:
      DataType: !Value Float32
      Scriptability: None
      AliasFor: Heat

  Smoke:
    opacity_xml:
      DataType: !Value Float32
      Scriptability: None
      AliasFor: Opacity
    size_xml:
      DataType: !Value Float32
      Scriptability: None
      AliasFor: Size
    riseVelocity_xml:
      DataType: !Value Float32
      Scriptability: None
      AliasFor: RiseVelocity
