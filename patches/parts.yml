Change:
  BasePart:
    # BasePart.BrickColor now defers to the Color3 properties in every case, so
    # we can basically pretend that BrickColor and brickColor never existed.
    brickColor:
      Serialization:
        Type: Migrate
        To: Color
        Migration: BrickColorToColor
    BrickColor:
      Serialization:
        Type: Migrate
        To: Color
        Migration: BrickColorToColor
    Color:
      Serialization:
        Type: SerializesAs
        As: Color3uint8

    Size:
      Serialization:
        Type: SerializesAs
        As: size

    MaterialVariant:
      Serialization:
        Type: SerializesAs
        As: MaterialVariantSerialized

  FormFactorPart:
    FormFactor:
      Serialization:
        Type: SerializesAs
        As: formFactorRaw
    formFactor:
      AliasFor: FormFactor

  Part:
    Shape:
      Serialization:
        Type: SerializesAs
        As: shape

  MeshPart:
    MeshId:
      Serialization:
        Type: Migrate
        To: MeshContent
        Migration: ContentIdToContent
    TextureID:
      Serialization:
        Type: Migrate
        To: TextureContent
        Migration: ContentIdToContent

# As of Roblox 726 these serialization-only aliases are no longer present in
# the API dump, so they must be added rather than changed.
Add:
  BasePart:
    Color3uint8:
      DataType: !Value Color3uint8
      Scriptability: None
      AliasFor: Color
    size:
      DataType: !Value Vector3
      Scriptability: None
      AliasFor: Size
    MaterialVariantSerialized:
      DataType: !Value String
      Scriptability: None
      AliasFor: MaterialVariant

  FormFactorPart:
    formFactorRaw:
      DataType: !Enum FormFactor
      Scriptability: None
      AliasFor: FormFactor

  Part:
    shape:
      DataType: !Enum PartType
      Scriptability: None
      AliasFor: Shape
