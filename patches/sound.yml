Change:
  Sound:
    MaxDistance:
      Serialization:
        Type: SerializesAs
        As: xmlRead_MaxDistance_3

    RollOffMinDistance:
      Serialization:
        Type: SerializesAs
        As: EmitterSize
    EmitterSize:
      AliasFor: RollOffMinDistance

    RollOffMaxDistance:
      Serialization:
        Type: SerializesAs
        As: xmlRead_MaxDistance_3

    SoundId:
      Serialization:
        Type: Migrate
        To: AudioContent
        Migration: ContentIdToContent

# As of Roblox 726 this serialization-only alias is no longer present in the
# API dump, so it must be added rather than changed.
Add:
  Sound:
    xmlRead_MaxDistance_3:
      DataType: !Value Float32
      Scriptability: None
      AliasFor: RollOffMaxDistance
